name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + schema + bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install bats + jq (ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq shellcheck

      - name: Install bats + jq + shellcheck (macOS)
        if: runner.os == 'macOS'
        # --quiet + || true 로 'already installed' 메시지가 set -e 환경에서 잡음 안 내도록
        run: |
          brew install --quiet bats-core jq shellcheck || true

      - name: Set up Node (for ajv-cli + acpx)
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install acpx (ACP boundary CLI)
        # Note: package is 'acpx' (not '@openclaw/acpx' which is a different backend)
        run: npm install -g acpx
        continue-on-error: true

      - name: Install project deps (MCP SDK + zod + tsc)
        run: npm install --no-audit --no-fund

      - name: Build MCP server (tsc)
        run: npm run build:mcp

      - name: bash -n on all .sh
        run: make syntax

      - name: shellcheck
        run: make lint

      - name: JSON schema validation (routing + bridge-event)
        run: make schema

      - name: engine doctor
        run: make doctor

      - name: bats test suite (114+ cases)
        run: make test
