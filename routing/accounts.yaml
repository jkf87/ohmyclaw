# OpenClaw 하네스 — 계정 풀 설정 (OAuth 우선)
# 여러 OAuth 계정을 풀로 관리하여 rate limit 분산 및 가용성 향상.
#
# 인증 방식 (auth_type):
#   oauth_codex      → codex_home 경로 (예: ~/.codex, ~/.codex-acct2)
#                       해당 디렉토리에 auth.json 이 있어야 사용 가능
#   oauth_openclaw   → openclaw_profile 이름 (예: default → ~/.openclaw,
#                       acct2 → ~/.openclaw-acct2)
#   api_key          → env_key 환경변수 (레거시, z.ai 같은 OAuth 미지원 프로바이더용)
#
# 추가 계정 등록:
#   1) 새 OAuth 디렉토리에서 로그인:
#        CODEX_HOME=~/.codex-acct2 codex login
#   2) 아래 accounts 리스트에 항목 추가
#   3) ./scripts/account-pool-demo.sh 로 검증

version: "1.1"

# ──────────────────────────────────────────────
# 글로벌 설정
# ──────────────────────────────────────────────
pool_defaults:
  strategy: round_robin          # round_robin | fan_out
  cooldown_seconds: 60           # rate limit 히트 시 쿨다운 (초)
  max_cooldown_seconds: 600      # 최대 쿨다운 (지수 백오프 상한)
  backoff_multiplier: 2          # 연속 오류 시 쿨다운 배수
  health_check_interval: 300     # 계정 상태 체크 간격 (초)
  fan_out_timeout: 30            # fan_out 모드 최대 대기 시간 (초)
  state_file: "state/account-pool-state.json"

# ──────────────────────────────────────────────
# 프로바이더별 계정 풀
# ──────────────────────────────────────────────
pools:
  # ── Codex (OpenAI) — OAuth 전용 ──
  codex:
    base_url: https://api.openai.com/v1
    strategy: round_robin
    accounts:
      - id: codex-primary
        auth_type: oauth_codex
        codex_home: ~/.codex
        weight: 10
        enabled: true

      # 두 번째 OAuth 계정 (활성화 전 ~/.codex-acct2 에 codex login 먼저 수행)
      - id: codex-secondary
        auth_type: oauth_codex
        codex_home: ~/.codex-acct2
        weight: 10
        enabled: true

  # ── Z.ai (GLM 시리즈) — OAuth 미지원, API 키 사용 ──
  zai:
    base_url: https://api.z.ai/v1
    strategy: round_robin
    accounts:
      - id: zai-primary
        auth_type: api_key
        env_key: ZAI_API_KEY
        weight: 10
        enabled: true

      - id: zai-secondary
        auth_type: api_key
        env_key: ZAI_API_KEY_2
        weight: 5
        enabled: true

  # ── fan_out 예제 (대용량 분산이 핵심일 때) ──
